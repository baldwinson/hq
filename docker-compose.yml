services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baldwinson-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-baldwinson}:${POSTGRES_PASSWORD:-baldwinson_dev}@postgres:5432/${POSTGRES_DB:-baldwinson}?sslmode=disable
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy_network

  postgres:
    image: postgres:16-alpine
    container_name: baldwinson-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baldwinson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baldwinson_dev}
      POSTGRES_DB: ${POSTGRES_DB:-baldwinson}
    ports:
      - "${POSTGRES_PORT:-5481}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baldwinson}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  proxy_network:
    external: true
